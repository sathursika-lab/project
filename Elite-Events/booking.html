<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">


    <style>
        body {
            background: linear-gradient(to right, #000, #1a1a1a);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container-box {
            max-width: 900px;
            margin: auto;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .form-control {
            background: transparent;
            border: 1px solid #555;
            color: white;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-check-label {
            margin-right: 15px;
        }

        .btn-book {
            background: #e0e0e0;
            color: black;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px 25px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="../logo.jpeg" alt="Elite Logo" style="height: 50px; border-radius: 50%;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="booking.html">Booking</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container container-box">

        <h1>Book your Event</h1>

        <form>

            <div class="row mb-3">
                <label class="col-md-3">Full Name</label>
                <div class="col-md-4">
                    <input type="text" class="form-control">
                </div>
                <div class="col-md-5">
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-md-3">Phone Number</label>
                <div class="col-md-9">
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-md-3">Email Address</label>
                <div class="col-md-9">
                    <input type="email" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-md-3">Event Date/Time</label>
                <div class="col-md-4">
                    <input type="date" class="form-control">
                </div>
                <div class="col-md-5">
                    <input type="time" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-md-3">Event Type</label>
                <div class="col-md-9">

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Wedding</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Birthday</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Baby Showers</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Business Events</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Other</label>
                    </div>

                </div>
            </div>

            <div class="row mb-3">
                <label class="col-md-3">Number of Guests</label>
                <div class="col-md-9">
                    <input type="number" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <label class="col-md-3">Service Selection</label>
                <div class="col-md-9">

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Hall Booking</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Photo/Video</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Decoration</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Food / Catering</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">DJ & Music</label>
                    </div>

                </div>
            </div>

            <div class="row mb-3">
                <label class="col-md-3">Package</label>
                <div class="col-md-9">

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Basic Package</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Standard Package</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Premium Package</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">Custom Budget</label>
                    </div>

                </div>
            </div>

            <div class="row mb-4">
                <label class="col-md-3">Location</label>

                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Home town">
                </div>

                <div class="col-md-3">
                    <input type="text" class="form-control" placeholder="District">
                </div>

                <div class="col-md-2">
                    <button type="button" class="btn btn-secondary w-100">Map</button>
                </div>

            </div>

            <div class="text-end">
                <button class="btn btn-book">Confirm Booking</button>
            </div>

        </form>

    </div>
    <footer class="footer mt-auto">
        <div class="container text-center text-md-start">
            <div class="row align-items-center">
                <div class="col-md-4 mb-3 mb-md-0 text-center text-md-start">
                    <span class="footer-brand">
                        <img src="../logo.jpeg" alt="Elite Logo" style="height: 60px; border-radius: 50%;">
                    </span>
                    <p class="footer-text mb-0">Elevating your special moments into unforgettable experiences.</p>
                </div>


            </div>
            <hr style="border-color: rgba(255,255,255,0.1)">

        </div>
    </footer>

</body>

</html>
